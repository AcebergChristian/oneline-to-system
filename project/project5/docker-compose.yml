services:
  backend:
    build: ./backend
    container_name: park5-backend
    ports:
      - "8005:8005"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: park5-frontend
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - REACT_APP_API_URL=http://localhost:8005
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    restart: unless-stopped