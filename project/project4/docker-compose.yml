services:
  backend:
    build: ./backend
    ports:
      - "8004:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:8004
    ports:
      - "3004:80"
    depends_on:
      - backend
